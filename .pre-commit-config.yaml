fail_fast: false
repos:
  - repo: local
    hooks:
      - id: lint-python
        name: lint Python
        entry: uv run python -m ruff check
        types: [python]
        language: system
        always_run: true
      - id: fmt-python
        name: fmt Python
        entry: uv run python -m ruff format
        types: [python]
        language: system
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: debug-statements
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace
